<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ouro. | v11.7</title><script src="https://cdn.tailwindcss.com"></script><style>
:root{--bg:#f7f1e8;--ink:#1c1712;--muted:#8b7b68;--panel:rgba(255,251,245,.76);--panel2:rgba(255,255,255,.85);--line:rgba(132,110,87,.18)}html.dark{--bg:#0c0e12;--ink:#f4efe7;--muted:#a79b8f;--panel:rgba(16,18,25,.78);--panel2:rgba(19,22,30,.9);--line:rgba(255,255,255,.08)}body{color:var(--ink);background:var(--bg);transition:background .35s,color .35s}.glass{background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--line);box-shadow:0 22px 60px rgba(53,34,13,.11)}.card{background:var(--panel2);border:1px solid var(--line);box-shadow:0 10px 26px rgba(53,34,13,.08);transition:transform .22s ease, box-shadow .22s ease, background .35s ease, border-color .35s ease}.card:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(53,34,13,.12)}.soft{box-shadow:0 10px 24px rgba(200,138,74,.20)}.modal{background:rgba(7,9,12,.58);backdrop-filter:blur(8px)}.badge{box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}.sidebar{transition:transform .28s ease, opacity .28s ease}.animate-fade{animation:fade .25s ease both}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.animate-pop{animation:pop .25s ease both}@keyframes pop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}*{scroll-behavior:smooth}</style></head><body class="min-h-screen"><div id="app" class="mx-auto max-w-[1800px] px-3 py-3 sm:px-4 lg:px-6"></div><div id="alertHost" class="fixed right-4 top-4 z-50 space-y-3"></div><script>

function load(){try{let raw=localStorage.getItem(KEY); return raw?JSON.parse(raw):seed}catch(e){return seed}} let offers=load();
function applyTheme(){document.documentElement.classList.toggle('dark',localStorage.getItem(THEME)==='dark')} function toggleTheme(){localStorage.setItem(THEME,document.documentElement.classList.contains('dark')?'light':'dark'); applyTheme(); renderSafe()}
function store(){try{localStorage.setItem(KEY,JSON.stringify(offers)); scheduleBackup()}catch(e){console.warn(e)}} function today(){return new Date().toISOString().slice(0,10)} function fmt(d){return new Date(d+'T00:00:00').toLocaleDateString('pt-BR')}
function days(o){let a=new Date(o.firstDate+'T00:00:00'),b=new Date();return Math.max(0,Math.floor((b-a)/86400000))} function trend(o){let s=o.snapshots||[]; if(s.length<2)return '→'; let d=s.at(-1).ads-s.at(-2).ads; return d>0?'↑':d<0?'↓':'→'} function diff(o){let s=o.snapshots||[]; return s.length<2?0:s.at(-1).ads-s.at(-2).ads} function totalChange(o){let s=o.snapshots||[]; return s.length<2?0:s.at(-1).ads-s[0].ads} function maxStep(o){let s=o.snapshots||[]; let m=0,da='—'; for(let i=1;i<s.length;i++){let d=s[i].ads-s[i-1].ads; if(Math.abs(d)>Math.abs(m)){m=d; da=s[i].date}} return {m,da}} function stableDays(o){let s=o.snapshots||[]; let c=0; for(let i=s.length-1;i>0;i--){ if(s[i].ads===s[i-1].ads) c++; else break } return c }
function trendColor(t){return t==='↑'?'text-emerald-400':t==='↓'?'text-rose-400':'text-amber-400'} function icon(t){return t==='↑'?'▲':t==='↓'?'▼':'◆'} function openModal(id){let e=document.getElementById(id); if(!e) return; e.classList.remove('hidden'); e.classList.add('flex')} function closeModal(id){let e=document.getElementById(id); if(!e) return; e.classList.add('hidden'); e.classList.remove('flex')}
function setScreen(x,i=0){screen=x;current=i; renderSafe()} function q(v){return '"'+String(v).replaceAll('"','""')+'"'}
function filtered(){let qv=(filterState.q||'').toLowerCase(); let arr=offers.filter(o=>`${o.name} ${o.desc} ${o.pageId||''} ${(o.tags||[]).join(' ')} ${(o.notes||[]).map(n=>n.text+' '+n.title).join('')}`.toLowerCase().includes(qv)); arr=arr.filter(o=>filterState.status==='all'?true:filterState.status==='up'?trend(o)==='↑':filterState.status==='down'?trend(o)==='↓':trend(o)==='→'); arr.sort((a,b)=>{if(filterState.sort==='ads_desc') return b.ads-a.ads; if(filterState.sort==='days_desc') return days(b)-days(a); if(filterState.sort==='trend_desc') return diff(b)-diff(a); if(filterState.sort==='trend_asc') return diff(a)-diff(b); return (b.firstDate||'').localeCompare(a.firstDate||'')}); return arr}
function periodFilteredOffers(){if(currentPeriod==='all') return filtered(); let n=Number(currentPeriod); let cutoff=new Date(); cutoff.setDate(cutoff.getDate()-n); return filtered().filter(o=>new Date(o.firstDate+'T00:00:00')>=cutoff)}

function setQ(v){filterState.q=v; renderSafe()} function setSort(v){filterState.sort=v; renderSafe()} function setStatus(v){filterState.status=v; renderSafe()} function setPeriod(v){currentPeriod=v; renderSafe()}
function notify(title,body,type='info'){let id=Math.random().toString(36).slice(2); notifications.unshift({id,title,body,type}); notifications=notifications.slice(0,3); renderAlerts(); setTimeout(()=>{notifications=notifications.filter(n=>n.id!==id); renderAlerts()},3500)}
function renderAlerts(){let host=document.getElementById('alertHost'); if(!host) return; host.innerHTML=notifications.map(n=>`<div class="animate-fade card rounded-[22px] p-4 min-w-[280px] max-w-[360px]"><div class="flex items-start justify-between gap-3"><div><div class="text-xs font-bold uppercase tracking-[0.22em] ${n.type==='warn'?'text-amber-500':n.type==='error'?'text-rose-500':'text-emerald-500'}">${n.title}</div><p class="mt-1 text-sm text-stone-600">${n.body}</p></div><button onclick="dismissAlert('${n.id}')" class="text-stone-400">×</button></div></div>`).join('')}
function dismissAlert(id){notifications=notifications.filter(n=>n.id!==id); renderAlerts()}
function checkAlerts(){offers.forEach(o=>{let s=o.snapshots||[]; if(s.length<2) return; let d=s.at(-1).ads-s.at(-2).ads; if(d>=8) notify('Alerta de crescimento',`${o.name} aumentou +${d} anúncios.`, 'warn'); if(d<=-8) notify('Alerta de queda',`${o.name} diminuiu ${d} anúncios.`, 'error')})}
function scheduleBackup(){clearTimeout(backupTimer); backupTimer=setTimeout(()=>{try{localStorage.setItem(KEY+'_backup',JSON.stringify({savedAt:new Date().toISOString(),theme:localStorage.getItem(THEME),offers})); renderBackupInfo()}catch(e){console.warn(e)}},400)}
function pushUndo(a){window.__undoStack.unshift(a); window.__undoStack=window.__undoStack.slice(0,5)} function undo(){let a=window.__undoStack.shift(); if(!a) return notify('Nada para desfazer','Nenhuma ação recente disponível.','info'); if(a.type==='delete') offers.splice(a.index,0,a.offer); if(a.type==='update') Object.assign(offers[a.index],a.before); store(); notify('Ação desfeita','A alteração foi revertida.','info'); renderSafe()}
function createOffer(){try{let name=document.getElementById('fName').value.trim(),ads=Number(document.getElementById('fAds').value),date=document.getElementById('fFirst').value||today(),msg=document.getElementById('formMsg'); if(!name||document.getElementById('fAds').value===''){msg.textContent='Preencha pelo menos o nome e a contagem inicial de anúncios.'; msg.className='mt-3 text-sm text-rose-400'; return} let tags=(document.getElementById('fTags').value||'').split(',').map(s=>s.trim()).filter(Boolean); offers.unshift({name,desc:document.getElementById('fDesc').value.trim(),link:document.getElementById('fLink').value.trim(),pageId:document.getElementById('fPage').value.trim(),firstDate:date,ads,id:'#'+String(offers.length+1).padStart(2,'0'),tags,notes:[{date,title:'Cadastro',tag:'manual',text:'Oferta adicionada manualmente.'}],snapshots:[{date,ads,note:'cadastro inicial'}]}); store(); notify('Oferta criada',name,'info'); setScreen('dash')}catch(e){console.error(e); alert('Erro ao salvar oferta.')}}
function spark(o){let s=o.snapshots||[]; if(s.length<2) return '<div class="h-40 grid place-items-center text-stone-400">Sem dados suficientes.</div>'; let vals=s.map(x=>x.ads),min=Math.min(...vals),max=Math.max(...vals),w=900,h=190,p=18; let pts=vals.map((v,i)=>{let x=p+(w-2*p)*(i/(vals.length-1)); let y=p+(h-2*p)*(1-((v-min)/Math.max(1,max-min))); return [x,y]}); let d=pts.map((p,i)=>`${i?'L':'M'}${p[0]},${p[1]}`).join(' '); return `<svg viewBox="0 0 ${w} ${h}" class="h-40 w-full"><defs><linearGradient id="lg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#c88a4a" stop-opacity=".55"/><stop offset="100%" stop-color="#c88a4a" stop-opacity="0"/></linearGradient></defs><path d="${d}" fill="none" stroke="#9f6534" stroke-width="6" stroke-linecap="round"/><path d="M${pts[0][0]},${h-p} ${pts.map((p,i)=>`${i?'L':''}${p[0]},${p[1]}`).join(' ')} L${pts.at(-1)[0]},${h-p} Z" fill="url(#lg)" opacity=".8"/></svg>`}
function chip(label,value){return `<div class="rounded-[26px] border border-[var(--line)] bg-[var(--panel2)] p-4 shadow-[0_10px_24px_rgba(53,34,13,.06)]"><p class="text-xs font-bold uppercase tracking-[0.22em] text-stone-500">${label}</p><div class="mt-2 text-3xl font-black">${value}</div></div>`}

function sidebar(){return `<aside class="sidebar ${sidebarOpen?'translate-x-0 opacity-100':'-translate-x-full opacity-0 lg:translate-x-0 lg:opacity-100'} fixed left-3 top-3 z-40 h-[calc(100vh-1.5rem)] w-[290px] glass rounded-[34px] p-4 lg:sticky lg:block"><div class="flex h-full flex-col"><div class="flex items-center justify-between"><div><div class="text-3xl font-black tracking-tight text-amber-700">ouro.</div><p class="text-xs text-stone-500">v11.7 clean</p></div><button class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-3 py-2 lg:hidden" onclick="toggleSidebar()">×</button></div><div class="mt-4 space-y-2"><button onclick="goto('dash')" class="w-full rounded-2xl border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 text-left font-semibold">Dashboard</button><button onclick="document.getElementById('form').scrollIntoView({behavior:'smooth'})" class="w-full rounded-2xl border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 text-left font-semibold">Nova oferta</button><button onclick="document.getElementById('compareBlock').scrollIntoView({behavior:'smooth'})" class="w-full rounded-2xl border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 text-left font-semibold">Comparar</button><button onclick="toggleTheme()" class="w-full rounded-2xl border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 text-left font-semibold">Modo ${localStorage.getItem(THEME)==='dark'?'claro':'escuro'}</button><button onclick="undo()" class="w-full rounded-2xl border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 text-left font-semibold">Desfazer</button></div><div class="mt-4 rounded-[26px] border border-[var(--line)] bg-[var(--panel2)] p-4"><div class="text-xs font-bold uppercase tracking-[0.22em] text-stone-500">Alertas automáticos</div><div class="mt-3 text-sm text-stone-500">Crescimento e queda forte aparecem no canto superior.</div></div><div class="mt-4 rounded-[26px] border border-[var(--line)] bg-[var(--panel2)] p-4"><div class="text-xs font-bold uppe function footer(){return `<div class="mt-6 pb-10 text-center text-xs text-stone-500">ouro v11.7 · limpeza visual e refinamento de interação</div>`}
function detail(){let o=offers[Math.max(0,Math.min(current,offers.length-1))]; if(!o) return `<div class="card rounded-[28px] p-6">Sem oferta selecionada.</div>`; let t=trend(o),mx=maxStep(o); return `<div class="grid gap-4 lg:grid-cols-[290px_1fr]"><div>${sidebar()}</div><main class="min-w-0"><button onclick="setScreen('dash')" class="mb-4 rounded-full border border-[var(--line)] bg-[var(--panel2)] px-4 py-2 soft">← Voltar</button><section class="glass rounded-[36px] p-6"><div class="flex flex-col justify-between gap-4 lg:flex-row"><div><div class="inline-flex items-center gap-2 rounded-full bg-amber-100 px-3 py-1 text-xs font-bold uppercase tracking-[0.22em] text-amber-800">Oferta detalhada</div><h1 class="mt-3 text-4xl font-black tracking-tight">${o.name}</h1><p class="mt-2 max-w-3xl text-stone-500">${o.desc||'Sem descrição cadastrada'}</p>${o.link?`<a class="mt-2 block text-sm text-amber-700 underline" href="${o.link}" target="_blank">Abrir página no Meta Ads</a>`:''}${o.pageId?`<div class="mt-2 text-sm text-stone-500">Page ID: <b>${o.pageId}</b></div>`:''}<div class="mt-3 flex flex-wrap gap-2">${(o.tags||[]).map(tag=>`<span class="badge rounded-full border border-[var(--line)] bg-[var(--panel2)] px-2 py-1 text-[11px] font-bold text-stone-500">${tag}</span>`).join('')}</div></div><div class="flex flex-wrap gap-2"><button onclick="openUpdate()" class="rounded-2xl bg-stone-900 px-4 py-3 font-semibold text-white soft">Registrar atualização</button><button onclick="openModal('deleteModal')" class="rounded-2xl bg-rose-500 px-4 py-3 font-semibold text-white soft">Excluir</button></div></div><div class="mt-6 grid gap-4 sm:grid-cols-2 xl:grid-cols-4">${kpi('Anúncios ativos',o.ads,'última leitura')}${kpi('Dias rodando',days(o),'desde '+fmt(o.firstDate))}${kpi('Histórico',o.snapshots.length+' leituras','registadas')}${kpi('Tendência',t==='↑'?'A subir':t==='↓'?'A descer':'Estável','última atualização')}</div></section><section class="mt-6 grid gap-4 lg:grid-cols-3">${highlight('Maior salto',mx.m>0?`+${mx.m}`:`${mx.m}`,mx.da==='—'?'Sem variação ainda':fmt(mx.da))}${highlight('Variação total',`${totalChange(o)>0?'+':''}${totalChange(o)}`,`de ${o.snapshots[0].ads} para ${o.ads}`)}${highlight('Dias sem mudar',`${stableDays(o)} dia(s)`,stableDays(o)>0?'Últimos snapshots iguais':'Sem sequência estável')}</section><section class="card mt-6 rounded-[34px] p-6"><div class="mb-4 flex items-center justify-between"><div><h2 class="text-2xl font-black">Evolução visual</h2><p class="text-sm text-stone-500">Linha do histórico de anúncios ativos.</p></div></div>${spark(o)}</section><section class="card mt-6 rounded-[34px] p-6"><div class="mb-4 flex items-center justify-between"><div><h2 class="text-2xl font-black">Dias de alteração</h2><p class="text-sm text-stone-500">Filtrado por período.</p></div><div class="flex gap-2"><button onclick="setPeriod('all')" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-3 py-2 text-sm">Tudo</button><button onclick="setPeriod('7')" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-3 py-2 text-sm">7 dias</button><button onclick="setPeriod('30')" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-3 py-2 text-sm">30 dias</button></div></div><div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead class="bg-black/5 text-stone-500"><tr><th class="p-3">Data</th><th class="p-3">Movimento</th><th class="p-3">Variação</th><th class="p-3">Contagem</th><th class="p-3">Nota</th></tr></thead><tbody>${events(o)}</tbody></table></div></section><section class="card mt-6 rounded-[34px] p-6"><h2 class="text-xl font-black">Notas</h2><div class="mt-4 grid gap-3 md:grid-cols-2">${(o.notes||[]).length?(o.notes||[]).map((n,idx)=>`<button onclick="editNote(${idx})" class="text-left rounded-2xl border border-[var(--line)] bg-[var(--panel2)] p-4"><div class="flex items-center justify-between"><b>${n.title}</b><span class="text-xs text-stone-500">${fmt(n.date)}</span></div><p class="mt-1 text-xs uppercase tracking-wide text-stone-500">#${n.tag}</p><p class="mt-2 text-sm text-stone-500">${n.text}</p></button>`).join(''):'<div class="text-stone-500">Sem notas ainda.</div>'}</div></section></main></div>`}
function events(o){let s=[...o.snapshots].sort((a,b)=>a.date.localeCompare(b.date)); let rows=[]; let filteredByPeriod=s; if(currentPeriod!=='all'){let n=Number(currentPeriod),cutoff=new Date(); cutoff.setDate(cutoff.getDate()-n); filteredByPeriod=s.filter(x=>new Date(x.date+'T00:00:00')>=cutoff)} for(let i=1;i<filteredByPeriod.length;i++){let prev=filteredByPeriod[i-1],x=filteredByPeriod[i],d=x.ads-prev.ads;if(!d) continue; let up=d>0; rows.push(`<tr class="border-t"><td class="p-3">${fmt(x.date)}</td><td class="p-3"><span class="rounded-full px-2 py-1 text-xs font-bold ${up?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${up?'Aumentou':'Diminuiu'}</span></td><td class="p-3 font-semibold ${up?'text-emerald-700':'text-rose-700'}">${up?'+':''}${d}</td><td class="p-3">${prev.ads} → ${x.ads}</td><td class="p-3 text-stone-500">${x.note||''}</td></tr>`)} return rows.join('')||'<tr><td colspan="5" class="p-4 text-stone-500">Ainda não há aumento ou diminuição registados.</td></tr>'}
function saveUpdate(){let o=offers[Math.max(0,Math.min(current,offers.length-1))]; if(!o) return; let date=document.getElementById('uDate').value,ads=Number(document.getElementById('uAds').value),note=document.getElementById('uNote').value.trim(); if(!date||document.getElementById('uAds').value==='') return; let before=JSON.parse(JSON.stringify(o)); let prev=o.snapshots.at(-1); let exists=o.snapshots.find(x=>x.date===date); if(exists){exists.ads=ads; exists.note=note||exists.note||''} else {o.snapshots.push({date,ads,note})} o.snapshots.sort((a,b)=>a.date.localeCompare(b.date)); o.ads=o.snapshots.at(-1).ads; let delta=prev?ads-prev.ads:0; o.notes.unshift({date,title:'Atualização',tag:delta>0?'crescimento':delta<0?'queda':'estável',text:`${delta>0?'Aumentou':'Diminuiu'} ${Math.abs(delta)} anúncio(s) em ${fmt(date)}.`}); pushUndo({type:'update',index:current,before}); store(); closeModal('updateModal'); notify('Atualização salva',`${o.name} foi atualizada.`, 'info'); renderSafe()}
function editNote(idx){let o=offers[Math.max(0,Math.min(current,offers.length-1))]; let n=o.notes[idx]; if(!n) return; let before=JSON.parse(JSON.stringify(o)); let title=prompt('Título da nota',n.title)||n.title; let tag=prompt('Tag da nota',n.tag)||n.tag; let text=prompt('Texto da nota',n.text)||n.text; o.notes[idx]={...n,title,tag,text}; pushUndo({type:'update',index:current,before}); store(); notify('Nota atualizada',title,'info'); renderSafe()}
function openUpdate(){let o=offers[Math.max(0,Math.min(current,offers.length-1))]; if(!o) return; document.getElementById('uDate').value=today(); document.getElementById('uAds').value=o.ads; document.getElementById('uNote').value=''; openModal('updateModal')}
function removeOffer(){let i=Math.max(0,Math.min(current,offers.length-1)); if(!offers[i]) return; let removed=offers[i]; offers.splice(i,1); if(current>=offers.length) current=Math.max(0,offers.length-1); pushUndo({type:'delete',index:i,offer:removed}); store(); closeModal('deleteModal'); screen='dash'; notify('Oferta excluída',removed.name,'warn'); renderSafe()}
function exportCSV(){let list=periodFilteredOffers(); let rows=[['nome','page_id','data_primeiro_anuncio','anuncios_atuais','dias_rodando','tendencia','variação_total','maior_salto','dias_sem_mudar','tags'].join(',')].concat(list.map(o=>[q(o.name),q(o.pageId||''),q(o.firstDate),o.ads,days(o),trend(o),totalChange(o),maxStep(o).m,stableDays(o),q((o.tags||[]).join(' | '))].join(','))); let blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8;'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='offertracker.csv'; a.click(); notify('CSV exportado','Seu arquivo foi gerado.','info')}
function makeBackup(){localStorage.setItem(KEY+'_backup',JSON.stringify({savedAt:new Date().toISOString(),theme:localStorage.getItem(THEME),offers})); renderBackupInfo(); notify('Backup salvo','Uma cópia local foi criada.','info')} function restoreBackup(){let raw=localStorage.getItem(KEY+'_backup'); if(!raw){notify('Sem backup','Nenhuma cópia local encontrada.','warn'); return} let data=JSON.parse(raw); offers=data.offers||offers; if(data.theme) localStorage.setItem(THEME,data.theme); applyTheme(); renderSafe(); notify('Backup restaurado','Os dados foram carregados.','info')} function exportBackup(){let raw=localStorage.getItem(KEY+'_backup'); if(!raw){makeBackup(); raw=localStorage.getItem(KEY+'_backup')} let blob=new Blob([raw],{type:'application/json;charset=utf-8;'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='offertracker-backup.json'; a.click(); notify('Backup exportado','Arquivo JSON gerado.','info')} function renderBackupInfo(){let el=document.getElementById('backupInfo'); if(!el) return; let raw=localStorage.getItem(KEY+'_backup'); if(!raw){el.textContent='Nenhum backup salvo ainda.'; return} let d=JSON.parse(raw); el.textContent=`Último backup: ${new Date(d.savedAt).toLocaleString('pt-BR')}`}
function pickCompare(i){if(compareIds[0]===null||compareIds[0]===i) compareIds[0]=i; else compareIds[1]=i; renderSafe()} function toggleSidebar(){sidebarOpen=!sidebarOpen; renderSafe()} function goto(x){setScreen(x)} function undo(){let a=window.__undoStack.shift(); if(!a) return notify('Nada para desfazer','Nenhuma ação recente disponível.','info'); if(a.type==='delete') offers.splice(a.index,0,a.offer); if(a.type==='update') Object.assign(offers[a.index],a.before); store(); notify('Ação desfeita','A alteração foi revertida.','info'); renderSafe()}
function comparePanel(){return `<section class="card mt-6 rounded-[34px] p-6"><div class="flex items-center justify-between"><div><h2 class="text-2xl font-black">Comparação lado a lado</h2><p class="text-sm text-stone-500">Escolha duas ofertas para comparar rapidamente.</p></div><button onclick="compareIds=[null,null]; renderSafe()" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-4 py-2 font-semibold">Limpar</button></div><div class="mt-4 grid gap-4 xl:grid-cols-2">${compareIds[0]!==null?compareBox(compareIds[0]):'<div class="card rounded-[30px] p-5 text-stone-500">Selecione a primeira oferta</div>'}${compareIds[1]!==null?compareBox(compareIds[1]):'<div class="card rounded-[30px] p-5 text-stone-500">Selecione a segunda oferta</div>'}</div><div class="mt-4 flex flex-wrap gap-2">${offers.slice(0,12).map((o,i)=>`<button onclick="pickCompare(${i})" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-3 py-2 text-sm">${o.name}</button>`).join('')}</div></section>`}
function dashboard(){let total=offers.reduce((a,o)=>a+o.ads,0),fall=offers.filter(o=>trend(o)==='↓').length,max=offers.length?Math.max(...offers.map(days)):0,hot=[...offers].sort((a,b)=>diff(b)-diff(a))[0],cold=[...offers].sort((a,b)=>diff(a)-diff(b))[0],arr=periodFilteredOffers(); return `<div class="grid gap-4 lg:grid-cols-[290px_1fr]"><div>${sidebar()}</div><main class="min-w-0"><div class="glass sticky top-3 z-30 mb-5 rounded-[34px] px-5 py-4"><header class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between"><div class="flex items-center gap-3"><button onclick="toggleSidebar()" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-3 py-2 lg:hidden">☰</button><div class="grid h-12 w-12 place-items-center rounded-[18px] bg-gradient-to-br from-amber-300 to-orange-400 text-2xl font-black text-white shadow-lg shadow-amber-400/30">O</div><div><div class="text-4xl font-black tracking-tight text-amber-700">ouro.</div><p class="text-sm text-stone-500">Monitorização de ofertas no Meta Ads</p></div></div><div class="flex flex-wrap gap-2"><button onclick="toggleTheme()" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 font-semibold">Tema ${localStorage.getItem(THEME)==='dark'?'claro':'escuro'}</button><button onclick="undo()" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 font-semibold">Desfazer</button><button onclick="document.getElementById('compareBlock').scrollIntoView({behavior:'smooth'})" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 font-semibold">Comparar</button><button onclick="document.getElementById('form').scrollIntoView({behavior:'smooth'})" class="rounded-full bg-emerald-400 px-5 py-3 font-bold shadow-lg shadow-emerald-400/25">+ Nova oferta</button></div></header></div><div id="alertsArea" class="mb-4 space-y-3"></div><section class="mb-5 grid gap-4 sm:grid-cols-2 xl:grid-cols-4">${kpi('Ofertas ativas',offers.length,'salvas localmente')}${kpi('Anúncios ativos',total,'somatório atual')}${kpi('Maior duração',max+' dias','desde o primeiro anúncio')}${kpi('Em queda',fall,'na última atualização')}</section><section class="mb-5 grid gap-4 xl:grid-cols-3">${highlight('Oferta com maior aumento',hot?hot.name:'—',hot?`+${Math.max(0,diff(hot))} anúncios · ${maxStep(hot).m>0?'+':''}${maxStep(hot).m} no maior salto`:'')}${highlight('Oferta com maior queda',cold?cold.name:'—',cold?`${diff(cold)} anúncios na última leitura`:'')}${highlight('Mais estável',bestStable(),'pouca ou nenhuma variação recente')}</section><section class="mb-7 flex flex-col gap-4 xl:flex-row xl:items-center"><div class="flex-1 glass rounded-full px-4 py-3"><input id="searchInput" value="${filterState.q}" oninput="setQ(this.value)" class="w-full bg-transparent" placeholder="Buscar oferta, page ID, tags, notas ou descrição"></div><div class="flex flex-wrap gap-3"><select onchange="setSort(this.value)" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 shadow-sm"><option value="recent" ${filterState.sort==='recent'?'selected':''}>Mais recentes</option><option value="ads_desc" ${filterState.sort==='ads_desc'?'selected':''}>Mais anúncios</option><option value="days_desc" ${filterState.sort==='days_desc'?'selected':''}>Mais dias</option><option value="trend_desc" ${filterState.sort==='trend_desc'?'selected':''}>Em crescimento</option><option value="trend_asc" ${filterState.sort==='trend_asc'?'selected':''}>Em queda</option></select><select onchange="setStatus(this.value)" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 shadow-sm"><option value="all" ${filterState.status==='all'?'selected':''}>Todas</option><option value="up" ${filterState.status==='up'?'selected':''}>Crescimento</option><option value="down" ${filterState.status==='down'?'selected':''}>Queda</option><option value="stable" ${filterState.status==='stable'?'selected':''}>Estáveis</option></select><select onchange="setPeriod(this.value)" class="rounded-full border border-[var(--line)] bg-[var(--panel2)] px-4 py-3 shadow-sm"><option value="all" ${currentPeriod==='all'?'selected':''}>Todo período</option><option value="7" ${currentPeriod==='7'?'selected':''}>Últimos 7 dias</option><option value="30" ${currentPeriod==='30'?'selected':''}>Últimos 30 dias</option></select><button onclick="exportCSV()" class="rounded-full bg-lime-300 px-4 py-3 font-bold shadow-sm">Exportar CSV</button></div><div class="text-sm text-stone-500 self-center"><span id="countInfo"></span></div></section><section class="mb-7 grid gap-5 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4">${arr.map(card).join('')}${arr.length?'':'<div class="card rounded-[32px] p-6 text-stone-500">Nenhuma oferta encontrada.</div>'}<button onclick="document.getElementById('form').scrollIntoView({behavior:'smooth'})" class="glass min-h-[320px] rounded-[32px] border-2 border-dashed border-amber-200 text-center"><span class="text-5xl">+</span><b class="mt-3 block text-lg">Adicionar nova oferta</b><small class="text-stone-500">Nome, link e primeira leitura</small></button></section><section id="compareBlock">${comparePanel()}</section>${form()}${backupPanel()}${footer()}</main></div>`}
function renderSafe(){try{const app=document.getElementById('app'); if(!app) return; app.innerHTML=screen==='dash'?dashboard():detail(); if(screen==='dash'){updateCounts(); renderAlerts(); renderBackupInfo(); checkAlerts();}}catch(e){console.error('render',e); const app=document.getElementById('app'); if(app) app.innerHTML='<div class="card rounded-[28px] p-6"><h2 class="text-2xl font-black">Falha ao montar a interface</h2><p class="mt-2 text-stone-600">Esta versão de recuperação desativa partes instáveis para voltar a funcionar.</p><button onclick="location.reload()" class="mt-4 rounded-2xl bg-stone-900 px-4 py-3 font-semibold text-white">Recarregar</button></div>'}}
window.setScreen=setScreen;window.openModal=openModal;window.closeModal=closeModal;window.createOffer=createOffer;window.saveUpdate=saveUpdate;window.removeOffer=removeOffer;window.exportCSV=exportCSV;window.setQ=setQ;window.setSort=setSort;window.setStatus=setStatus;window.openUpdate=openUpdate;window.undo=undo;window.pickCompare=pickCompare;window.toggleSidebar=toggleSidebar;window.goto=goto;window.toggleTheme=toggleTheme;window.makeBackup=makeBackup;window.restoreBackup=restoreBackup;window.exportBackup=exportBackup;window.dismissAlert=dismissAlert;window.renderBackupInfo=renderBackupInfo;window.editNote=editNote;applyTheme();renderSafe();
</script></body></html>
